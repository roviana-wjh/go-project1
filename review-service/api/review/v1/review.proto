syntax = "proto3";

package api.review.v1;

import "google/api/annotations.proto";
import "validate/validate.proto";

option go_package = "review-service/api/review/v1;v1";
option java_multiple_files = true;
option java_package = "api.review.v1";

// 评价服务
service Review {
	// 创建评价
	rpc CreateReview (CreateReviewRequest) returns (CreateReviewReply) {
		option (google.api.http) = {
			post: "/v1/review"
			body: "*"
		};
	}
	// 修改评价
	rpc UpdateReview (UpdateReviewRequest) returns (UpdateReviewReply) {
		option (google.api.http) = {
			put: "/v1/review/{reviewID}"
			body: "*"
		};
	}
	// 删除评价
	rpc DeleteReview (DeleteReviewRequest) returns (DeleteReviewReply) {
		option (google.api.http) = {
			delete: "/v1/review/{reviewID}"
		};
	}
	// 获取单条评价（路径避免与 /v1/review/order、/v1/review/user 冲突）
	rpc GetReview (GetReviewRequest) returns (GetReviewReply) {
		option (google.api.http) = {
			get: "/v1/review/detail/{reviewID}"
		};
	}
	// 按订单分页列评价
	rpc ListReview (ListReviewRequest) returns (ListReviewReply) {
		option (google.api.http) = {
			get: "/v1/review/order/{orderID}"
		};
	}
	// 运营审核评价
	rpc AuditReview (AuditReviewRequest) returns (AuditReviewReply) {
		option (google.api.http) = {
			post: "/v1/review/audit"
			body: "*"
		};
	}
	// 商家回复评价
	rpc ReplyReview (ReplyReviewRequest) returns (ReplyReviewReply) {
		option (google.api.http) = {
			post: "/v1/review/reply"
			body: "*"
		};
	}
	// 商家申诉评价
	rpc AppealReview (AppealReviewRequest) returns (AppealReviewReply) {
		option (google.api.http) = {
			post: "/v1/review/appeal"
			body: "*"
		};
	}
	// 运营审核申诉
	rpc AuditAppeal (AuditAppealRequest) returns (AuditAppealReply) {
		option (google.api.http) = {
			post: "/v1/review/appeal/audit"
			body: "*"
		};
	}
	// 按用户分页列评价
	rpc ListReviewByUseId (ListReviewByUseIdRequest) returns (ListReviewReply) {
		option (google.api.http) = {
			get: "/v1/review/user/{userID}"
		};
	}
	// 按店铺分页列评价
	rpc ListReviewByStoreId (ListReviewByStoreIdRequest) returns (ListReviewByStoreIdReply) {
		option (google.api.http) = {
			get: "/v1/review/store/{storeID}"
		};
	}
	// 运营端：分页获取待审核评价（查 MySQL，强一致）
	rpc ListPendingReviews (ListPendingReviewsRequest) returns (ListReviewReply) {
		option (google.api.http) = {
			get: "/v1/review/pending"
		};
	}
	// 运营端：分页获取待审核申诉（查 MySQL，强一致）
	rpc ListPendingAppeals (ListPendingAppealsRequest) returns (ListPendingAppealsReply) {
		option (google.api.http) = {
			get: "/v1/review/appeal/pending"
		};
	}
}

// ---------- 创建 ----------

message ListReviewByStoreIdRequest {
	int64 storeID = 1 [(validate.rules).int64 = {gt: 0}];
	int32 page = 2 [(validate.rules).int32 = {gte: 1}];
	int32 pageSize = 3 [(validate.rules).int32 = {gte: 1, lte: 100}];
}

message ListReviewByStoreIdReply {
	repeated ReviewListItem list = 1;
	int64 total = 2;
}

message ListPendingReviewsRequest {
	int32 page = 1 [(validate.rules).int32 = {gte: 1}];
	int32 pageSize = 2 [(validate.rules).int32 = {gte: 1, lte: 100}];
}

message ListPendingAppealsRequest {
	int32 page = 1 [(validate.rules).int32 = {gte: 1}];
	int32 pageSize = 2 [(validate.rules).int32 = {gte: 1, lte: 100}];
}

message AppealListItem {
	int64 appealID = 1;
	int64 reviewID = 2;
	int64 storeID = 3;
	int32 status = 4;
	string reason = 5;
	string content = 6;
	string picInfo = 7;
	string videoInfo = 8;
	string opRemarks = 9;
	string opUser = 10;
	int64 createAt = 11;
}

message ListPendingAppealsReply {
	repeated AppealListItem list = 1;
	int64 total = 2;
}

message CreateReviewRequest {
	int64 userID = 1 [(validate.rules).int64 = {gt: 0}];
	int64 orderID = 2 [(validate.rules).int64 = {gt: 0}];
	int32 score = 3 [(validate.rules).int32 = {gte: 0, lte: 5}];
	int32 serviceScore = 4 [(validate.rules).int32 = {gte: 0, lte: 5}];
	int32 expressScore = 5 [(validate.rules).int32 = {gte: 0, lte: 5}];
	string content = 6 [(validate.rules).string = {min_len: 1, max_len: 5000}];
	string picInfo = 7 [(validate.rules).string = {max_len: 8192}];
	string videoInfo = 8 [(validate.rules).string = {max_len: 8192}];
	bool anonymous = 9;
	int64 storeID = 10 [(validate.rules).int64 = {gt: 0}];
}

message CreateReviewReply {
	int64 reviewID = 1;
}

// ---------- 更新 / 删除 / 查询 ----------

message UpdateReviewRequest {
	int64 reviewID = 1 [(validate.rules).int64 = {gt: 0}];
	int64 userID = 2 [(validate.rules).int64 = {gt: 0}];
	int32 score = 3 [(validate.rules).int32 = {gte: 0, lte: 5}];
	int32 serviceScore = 4 [(validate.rules).int32 = {gte: 0, lte: 5}];
	int32 expressScore = 5 [(validate.rules).int32 = {gte: 0, lte: 5}];
	string content = 6 [(validate.rules).string = {min_len: 1, max_len: 5000}];
	string picInfo = 7 [(validate.rules).string = {max_len: 8192}];
	string videoInfo = 8 [(validate.rules).string = {max_len: 8192}];
}

message UpdateReviewReply {}

message DeleteReviewRequest {
	int64 reviewID = 1 [(validate.rules).int64 = {gt: 0}];
	int64 userID = 2 [(validate.rules).int64 = {gt: 0}];
}

message DeleteReviewReply {}

message GetReviewRequest {
	int64 reviewID = 1 [(validate.rules).int64 = {gt: 0}];
}

message GetReviewReply {
	ReviewListItem item = 1;
}

message ListReviewRequest {
	int64 orderID = 1 [(validate.rules).int64 = {gt: 0}];
	int32 page = 2 [(validate.rules).int32 = {gte: 1}];
	int32 pageSize = 3 [(validate.rules).int32 = {gte: 1, lte: 100}];
}

message ListReviewReply {
	repeated ReviewListItem list = 1;
	int64 total = 2;
}

message ReviewListItem {
	int64 reviewID = 1;
	int64 userID = 2;
	int64 orderID = 3;
	int32 score = 4;
	int32 serviceScore = 5;
	int32 expressScore = 6;
	string content = 7;
	string picInfo = 8;
	string videoInfo = 9;
	int32 status = 10;
	int32 hasReply = 11;
	int64 createAt = 12; // Unix 毫秒时间戳
}

// ---------- 运营审核评价 ----------

message AuditReviewRequest {
	int64 reviewID = 1 [(validate.rules).int64 = {gt: 0}];
	// 1=通过(置为审核通过) 2=驳回(置为审核不通过)
	int32 result = 2 [(validate.rules).int32 = {in: [1, 2]}];
	string remark = 3 [(validate.rules).string = {max_len: 2000}];
	string operator = 4 [(validate.rules).string = {min_len: 1, max_len: 128}];
}

message AuditReviewReply {
	int64 reviewID = 1;
	int32 status = 2;
}

// ---------- 商家回复 ----------

message ReplyReviewRequest {
	int64 reviewID = 1 [(validate.rules).int64 = {gt: 0}];
	int64 storeID = 2 [(validate.rules).int64 = {gt: 0}];
	string content = 3 [(validate.rules).string = {min_len: 1, max_len: 5000}];
	string picInfo = 4 [(validate.rules).string = {max_len: 8192}];
	string videoInfo = 5 [(validate.rules).string = {max_len: 8192}];
	string extJSON = 6 [(validate.rules).string = {max_len: 8192}];
	string ctrlJSON = 7 [(validate.rules).string = {max_len: 8192}];
}

message ReplyReviewReply {
	int64 replyID = 1;
}

// ---------- 申诉 / 审申诉 ----------

message AppealReviewRequest {
	int64 userID = 1 [(validate.rules).int64 = {gt: 0}];
	int64 reviewID = 2 [(validate.rules).int64 = {gt: 0}];
	string reason = 3 [(validate.rules).string = {min_len: 1, max_len: 2000}];
	string picInfo = 4 [(validate.rules).string = {max_len: 8192}];
}

message AppealReviewReply {
	int64 appealID = 1;
}

message AuditAppealRequest {
	int64 appealID = 1 [(validate.rules).int64 = {gt: 0}];
	// 1=通过 2=驳回
	int32 result = 2 [(validate.rules).int32 = {in: [1, 2]}];
	string remark = 3 [(validate.rules).string = {max_len: 2000}];
	string operator = 4 [(validate.rules).string = {min_len: 1, max_len: 128}];
}

message AuditAppealReply {}

// ---------- 按用户列评价 ----------

message ListReviewByUseIdRequest {
	int64 userID = 1 [(validate.rules).int64 = {gt: 0}];
	int32 page = 2 [(validate.rules).int32 = {gte: 1}];
	int32 pageSize = 3 [(validate.rules).int32 = {gte: 1, lte: 100}];
}
