syntax = "proto3";

package business.v1;

import "google/api/annotations.proto";
import "validate/validate.proto";

option go_package = "review-B/api/api/business;v1";
option java_multiple_files = true;
option java_package = "dev.kratos.api.business.v1";

service Business {
    //商家回复用户评价，通过rpc
    rpc ReplyReview(ReplyReviewRequest) returns (ReplyReviewReply){
        option (google.api.http) = {
            post:"business/v1/review/reply",
            body:"*"
        };
    }
	//商家申诉用户评价
	rpc AppealReview(AppealReviewRequest) returns (AppealReviewReply){
		option (google.api.http) = {
			post:"business/v1/review/appeal",
			body:"*"
		};
	}
}

message ReplyReviewRequest {
	int64 reviewID = 1 [(validate.rules).int64 = {gt: 0}];
	int64 storeID = 2 [(validate.rules).int64 = {gt: 0}];
	string content = 3 [(validate.rules).string = {min_len: 1, max_len: 5000}];
	string picInfo = 4 [(validate.rules).string = {max_len: 8192}];
	string videoInfo = 5 [(validate.rules).string = {max_len: 8192}];
	string extJSON = 6 [(validate.rules).string = {max_len: 8192}];
	string ctrlJSON = 7 [(validate.rules).string = {max_len: 8192}];
}

message ReplyReviewReply {
	int64 replyID = 1;
}

message AppealReviewRequest {
	
}

message AppealReviewReply {
	
}