syntax = "proto3";

package api.operation.v1;

import "google/api/annotations.proto";
import "validate/validate.proto";

option go_package = "review-O/api/operation/v1;v1";
option java_multiple_files = true;
option java_package = "api.operation.v1";

// Operation 运营端：转发 review-service 的审核能力
service Operation {
	// 审核评价
	rpc AuditReview (AuditReviewRequest) returns (AuditReviewReply) {
		option (google.api.http) = {
			post: "/v1/op/review/audit"
			body: "*"
		};
	}
	// 审核申诉
	rpc AuditAppeal (AuditAppealRequest) returns (AuditAppealReply) {
		option (google.api.http) = {
			post: "/v1/op/review/appeal/audit"
			body: "*"
		};
	}
	// 拉取待审核评价列表（运营看板）
	rpc ListPendingReviews (ListPendingReviewsRequest) returns (ListPendingReviewsReply) {
		option (google.api.http) = {
			get: "/v1/op/review/pending"
		};
	}
	// 拉取待审核申诉列表（运营看板）
	rpc ListPendingAppeals (ListPendingAppealsRequest) returns (ListPendingAppealsReply) {
		option (google.api.http) = {
			get: "/v1/op/review/appeal/pending"
		};
	}
}

message AuditReviewRequest {
	int64 reviewID = 1 [(validate.rules).int64 = {gt: 0}];
	// 1=通过 2=驳回（与 review-service 一致）
	int32 result = 2 [(validate.rules).int32 = {in: [1, 2]}];
	string remark = 3 [(validate.rules).string = {max_len: 2000}];
	string operator = 4 [(validate.rules).string = {min_len: 1, max_len: 128}];
}

message AuditReviewReply {
	int64 reviewID = 1;
	int32 status = 2;
}

message AuditAppealRequest {
	int64 appealID = 1 [(validate.rules).int64 = {gt: 0}];
	int32 result = 2 [(validate.rules).int32 = {in: [1, 2]}];
	string remark = 3 [(validate.rules).string = {max_len: 2000}];
	string operator = 4 [(validate.rules).string = {min_len: 1, max_len: 128}];
}

message AuditAppealReply {}

message ListPendingReviewsRequest {
	int32 page = 1 [(validate.rules).int32 = {gte: 1}];
	int32 pageSize = 2 [(validate.rules).int32 = {gte: 1, lte: 100}];
}

message PendingReviewItem {
	int64 reviewID = 1;
	int64 userID = 2;
	int64 orderID = 3;
	int32 score = 4;
	int32 serviceScore = 5;
	int32 expressScore = 6;
	string content = 7;
	string picInfo = 8;
	string videoInfo = 9;
	int32 status = 10;
	int32 hasReply = 11;
	int64 createAt = 12;
}

message ListPendingReviewsReply {
	repeated PendingReviewItem list = 1;
	int64 total = 2;
}

message ListPendingAppealsRequest {
	int32 page = 1 [(validate.rules).int32 = {gte: 1}];
	int32 pageSize = 2 [(validate.rules).int32 = {gte: 1, lte: 100}];
}

message PendingAppealItem {
	int64 appealID = 1;
	int64 reviewID = 2;
	int64 storeID = 3;
	int32 status = 4;
	string reason = 5;
	string content = 6;
	string picInfo = 7;
	string videoInfo = 8;
	string opRemarks = 9;
	string opUser = 10;
	int64 createAt = 11;
}

message ListPendingAppealsReply {
	repeated PendingAppealItem list = 1;
	int64 total = 2;
}
